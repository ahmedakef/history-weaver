# HOW TO ADD A NEW PERSON:
#
# Copy the template below and fill in the details:
#
#   - id: unique_id          # A short unique name (no spaces, use underscores)
#     name:                   # Name supports multiple languages:
#       en: Full Name         #   English name
#       ar: الاسم الكامل       #   Arabic name (optional)
#     born: 1000              # Year of birth (Gregorian, negative for BC)
#     died: 1100              # Year of death (Gregorian, negative for BC)
#     categories:             # One or more category ids (can be root or subcategories)
#       - mathematics         # Example subcategory
#       - philosophy          # Can add multiple
#     description:            # Description supports multiple languages:
#       en: A short bio in English
#       ar: نبذة مختصرة بالعربية  # (optional)
#     image: https://upload.wikimedia.org/...  # Optional: URL to a portrait/photo
#     wikipedia:              # Optional: Wikipedia links by language
#       en: https://en.wikipedia.org/wiki/Full_Name
#       ar: https://ar.wikipedia.org/wiki/الاسم_الكامل  # (optional; if missing, English link is used as fallback)
#     relations:              # Optional: connections to other people
#       - type: father_of     # Options: father_of, mother_of, child_of, teacher_of, student_of, influenced, colleague
#         target: other_id    # The id of the related person
#       - type: teacher_of
#         target: another_id
#
# NOTE: Figures tagged with a subcategory (e.g. "fiqh") are automatically
#       included when filtering by any parent category (e.g. "religion").
#
# =============================================================

figures:

  # ---- Prophet Muhammad & the Rashidun ----

  - id: prophet_muhammad
    name:
      en: Prophet Muhammad ﷺ
      ar: النبي محمد ﷺ
    born: 570
    died: 632
    categories:
      - islam
    description:
      en: >
        The final prophet and messenger of God in Islam. Born in Mecca,
        he received the first revelation at age 40 and spent 23 years
        conveying the Quran. He established the first Muslim community
        in Medina and unified the Arabian Peninsula under Islam.
      ar: >
        خاتم الأنبياء والمرسلين في الإسلام. وُلد في مكة وتلقى الوحي
        الأول في سن الأربعين وأمضى 23 عاماً في تبليغ القرآن. أسّس
        أول مجتمع إسلامي في المدينة ووحّد شبه الجزيرة العربية تحت الإسلام.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Dark_vignette_Al-Masjid_AL-Nabawi_Door800x600x300_%28cropped%29.jpg/250px-Dark_vignette_Al-Masjid_AL-Nabawi_Door800x600x300_%28cropped%29.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Muhammad
      ar: https://ar.wikipedia.org/wiki/محمد
    relations:
      - type: father_of
        target: fatimah
      - type: teacher_of
        target: abu_bakr
      - type: teacher_of
        target: umar
      - type: teacher_of
        target: uthman
      - type: teacher_of
        target: ali

  - id: abu_bakr
    name:
      en: Abu Bakr al-Siddiq
      ar: أبو بكر الصديق
    born: 573
    died: 634
    categories:
      - islam
      - authority
    description:
      en: >
        The first Rashidun caliph and one of the closest companions of
        Prophet Muhammad. He was the first free adult male to accept Islam
        and led the Muslim community after the Prophet's death, unifying
        Arabia during the Ridda wars.
      ar: >
        أول الخلفاء الراشدين وأقرب أصحاب النبي محمد. كان أول رجل حر
        بالغ يعتنق الإسلام وقاد الأمة الإسلامية بعد وفاة النبي
        ووحّد الجزيرة العربية في حروب الردة.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/20131203_Istanbul_091.jpg/330px-20131203_Istanbul_091.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Abu_Bakr
      ar: https://ar.wikipedia.org/wiki/أبو_بكر_الصديق
    relations:
      - type: student_of
        target: prophet_muhammad
      - type: father_of
        target: aisha

  - id: umar
    name:
      en: Umar ibn al-Khattab
      ar: عمر بن الخطاب
    born: 584
    died: 644
    categories:
      - islam
      - authority
    description:
      en: >
        The second Rashidun caliph, known for his strong leadership and
        justice. Under his rule, the Islamic empire expanded dramatically
        to include Persia, the Levant, and Egypt. He established many
        administrative institutions including the Islamic calendar.
      ar: >
        ثاني الخلفاء الراشدين، عُرف بقيادته القوية وعدله. في عهده
        توسّعت الدولة الإسلامية لتشمل فارس والشام ومصر. أسّس
        مؤسسات إدارية عديدة منها التقويم الهجري.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Umar_al-Farooq_Masjid_an-Nabawi_Calligraphy.png/330px-Umar_al-Farooq_Masjid_an-Nabawi_Calligraphy.png
    wikipedia:
      en: https://en.wikipedia.org/wiki/Umar
      ar: https://ar.wikipedia.org/wiki/عمر_بن_الخطاب
    relations:
      - type: student_of
        target: prophet_muhammad

  - id: uthman
    name:
      en: Uthman ibn Affan
      ar: عثمان بن عفان
    born: 576
    died: 656
    categories:
      - islam
      - authority
    description:
      en: >
        The third Rashidun caliph, known as "Dhun-Nurayn" (possessor of
        two lights) for marrying two of the Prophet's daughters. He
        oversaw the standardization of the Quran into a single written
        codex, one of the most important acts in Islamic history.
      ar: >
        ثالث الخلفاء الراشدين، يُلقّب بـ"ذي النورين" لزواجه من
        ابنتين للنبي. أشرف على توحيد المصحف في نسخة واحدة مكتوبة
        وهو من أهم الأعمال في تاريخ الإسلام.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Uthman_Masjid_an-Nabawi_Calligraphy.png/330px-Uthman_Masjid_an-Nabawi_Calligraphy.png
    wikipedia:
      en: https://en.wikipedia.org/wiki/Uthman
      ar: https://ar.wikipedia.org/wiki/عثمان_بن_عفان
    relations:
      - type: student_of
        target: prophet_muhammad

  - id: ali
    name:
      en: Ali ibn Abi Talib
      ar: علي بن أبي طالب
    born: 601
    died: 661
    categories:
      - islam
      - authority
      - fiqh
    description:
      en: >
        The fourth Rashidun caliph, cousin and son-in-law of Prophet
        Muhammad. Known for his deep knowledge, bravery, and eloquence.
        He is central to both Sunni and Shia traditions and is regarded
        as the "Gate of Knowledge" of the Prophet.
      ar: >
        رابع الخلفاء الراشدين، ابن عم النبي محمد وصهره. عُرف بعلمه
        العميق وشجاعته وبلاغته. يحتل مكانة محورية في التقليدين
        السني والشيعي ويُلقّب بـ"باب مدينة العلم".
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Ali_Masjid_an-Nabawi_Calligraphy.png/330px-Ali_Masjid_an-Nabawi_Calligraphy.png
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ali
      ar: https://ar.wikipedia.org/wiki/علي_بن_أبي_طالب
    relations:
      - type: student_of
        target: prophet_muhammad
      - type: child_of
        target: fatimah

  - id: fatimah
    name:
      en: Fatimah al-Zahra
      ar: فاطمة الزهراء
    born: 605
    died: 632
    categories:
      - islam
    description:
      en: >
        Daughter of Prophet Muhammad and Khadijah, wife of Ali ibn Abi
        Talib, and mother of al-Hasan and al-Husayn. She is one of the
        most revered women in Islam and a key figure in the Prophet's household.
      ar: >
        ابنة النبي محمد وخديجة، زوجة علي بن أبي طالب وأم الحسن
        والحسين. من أجلّ النساء في الإسلام وشخصية محورية في آل البيت.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Fatimah
      ar: https://ar.wikipedia.org/wiki/فاطمة_الزهراء
    relations:
      - type: child_of
        target: prophet_muhammad
      - type: mother_of
        target: ali

  - id: aisha
    name:
      en: Aisha bint Abi Bakr
      ar: عائشة بنت أبي بكر
    born: 613
    died: 678
    categories:
      - islam
      - hadith
    description:
      en: >
        Wife of Prophet Muhammad and daughter of Abu Bakr. One of the
        most prolific narrators of hadith, transmitting over 2,200
        traditions. She was a leading scholar consulted by companions
        on matters of law, theology, and medicine.
      ar: >
        زوجة النبي محمد وابنة أبي بكر. من أكثر رواة الحديث غزارة
        إذ روت أكثر من 2200 حديث. كانت عالمة بارزة يستشيرها
        الصحابة في الفقه والعقيدة والطب.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Aisha
      ar: https://ar.wikipedia.org/wiki/عائشة_بنت_أبي_بكر
    relations:
      - type: child_of
        target: abu_bakr
      - type: teacher_of
        target: ibn_shihab_al_zuhri

  - id: abu_hurayrah
    name:
      en: Abu Hurayrah
      ar: أبو هريرة
    born: 603
    died: 681
    categories:
      - islam
      - hadith
    description:
      en: >
        The most prolific narrator of hadith among the companions of
        Prophet Muhammad, credited with transmitting over 5,300 traditions.
        He embraced Islam in 629 CE and devoted himself to memorizing
        and transmitting the Prophet's sayings.
      ar: >
        أكثر الصحابة رواية للحديث النبوي، يُنسب إليه نقل أكثر من
        5300 حديث. أسلم عام 629م وكرّس حياته لحفظ أحاديث النبي ونقلها.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Abu_Hurairah
      ar: https://ar.wikipedia.org/wiki/أبو_هريرة
    relations:
      - type: student_of
        target: prophet_muhammad
      - type: teacher_of
        target: ibn_shihab_al_zuhri

  - id: ibn_abbas
    name:
      en: Abdullah ibn Abbas
      ar: عبد الله بن عباس
    born: 619
    died: 687
    categories:
      - islam
      - hadith
      - fiqh
    description:
      en: >
        Cousin of Prophet Muhammad and one of the most learned companions,
        known as "the Ocean" for his vast knowledge. He narrated about
        1,660 hadith and is considered the father of Quranic exegesis (tafsir).
      ar: >
        ابن عم النبي محمد ومن أعلم الصحابة، يُلقّب بـ"البحر" لسعة علمه.
        روى نحو 1660 حديثاً ويُعتبر مؤسس علم التفسير القرآني.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Abdullah_ibn_Abbas
      ar: https://ar.wikipedia.org/wiki/عبد_الله_بن_عباس
    relations:
      - type: student_of
        target: prophet_muhammad
      - type: student_of
        target: umar

  - id: ibn_umar
    name:
      en: Abdullah ibn Umar
      ar: عبد الله بن عمر
    born: 614
    died: 693
    categories:
      - islam
      - hadith
      - fiqh
    description:
      en: >
        Son of Caliph Umar and one of the most respected companions.
        He narrated about 2,630 hadith and was known for meticulously
        following the Prophet's Sunnah in every detail of his life.
      ar: >
        ابن الخليفة عمر ومن أجلّ الصحابة. روى نحو 2630 حديثاً
        وعُرف بحرصه الشديد على اتباع سنة النبي في كل تفاصيل حياته.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Abdullah_ibn_Umar
      ar: https://ar.wikipedia.org/wiki/عبد_الله_بن_عمر_بن_الخطاب
    relations:
      - type: child_of
        target: umar
      - type: teacher_of
        target: ibn_shihab_al_zuhri

  - id: anas_ibn_malik
    name:
      en: Anas ibn Malik
      ar: أنس بن مالك
    born: 612
    died: 712
    categories:
      - islam
      - hadith
    description:
      en: >
        Personal servant of Prophet Muhammad for ten years and one of
        the last surviving companions. He narrated over 2,200 hadith
        and lived to be about 100 years old, becoming a vital link
        in the chains of hadith transmission.
      ar: >
        خادم النبي محمد الشخصي لعشر سنوات ومن آخر الصحابة وفاة.
        روى أكثر من 2200 حديث وعاش نحو مئة عام مما جعله حلقة
        حيوية في سلاسل رواية الحديث.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Anas_ibn_Malik
      ar: https://ar.wikipedia.org/wiki/أنس_بن_مالك
    relations:
      - type: student_of
        target: prophet_muhammad
      - type: teacher_of
        target: ibn_shihab_al_zuhri

  # ---- The Islamic Golden Age ----

  - id: al_khwarizmi
    name:
      en: Al-Khwarizmi
      ar: محمد بن موسى الخوارزمي
    born: 780
    died: 850
    categories:
      - mathematics
      - astronomy
    description:
      en: >
        Persian polymath who produced vastly influential works in mathematics,
        astronomy, and geography. His name gave rise to the term "algorithm,"
        and his book on algebra introduced systematic methods for solving
        linear and quadratic equations.
      ar: >
        عالم موسوعي فارسي أنتج أعمالاً مؤثرة في الرياضيات والفلك والجغرافيا.
        اشتُق مصطلح "الخوارزمية" من اسمه، وقدّم كتابه في الجبر أساليب
        منهجية لحل المعادلات الخطية والتربيعية.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Madrid_-_Ciudad_Universitaria%2C_Monumento_a_Muhammad_al-Juarismi_%28cropped%29.jpg/330px-Madrid_-_Ciudad_Universitaria%2C_Monumento_a_Muhammad_al-Juarismi_%28cropped%29.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Khwarizmi
      ar: https://ar.wikipedia.org/wiki/الخوارزمي
    relations:
      - type: influenced
        target: al_kindi

  - id: al_kindi
    name:
      en: Al-Kindi
      ar: الكندي
    born: 801
    died: 873
    categories:
      - philosophy
      - mathematics
      - medicine
    description:
      en: >
        Arab philosopher, mathematician, and physician, known as the
        "Father of Arab philosophy." He was the first of the Muslim
        peripatetic philosophers, introducing Greek philosophy to the
        Islamic world and pioneering cryptanalysis.
      ar: >
        فيلسوف وعالم رياضيات وطبيب عربي، يُعرف بـ"أبو الفلسفة العربية."
        كان أول الفلاسفة المشّائين المسلمين، أدخل الفلسفة اليونانية
        إلى العالم الإسلامي وكان رائداً في تحليل الشفرات.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Stamp_IQ_1962_6f.jpg/330px-Stamp_IQ_1962_6f.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Kindi
      ar: https://ar.wikipedia.org/wiki/الكندي
    relations:
      - type: influenced
        target: al_farabi

  # ---- Early Hadith Scholars & Narrators ----

  - id: ibn_shihab_al_zuhri
    name:
      en: Ibn Shihab al-Zuhri
      ar: ابن شهاب الزهري
    born: 678
    died: 742
    categories:
      - hadith
    description:
      en: >
        One of the earliest and most important hadith scholars, considered
        a pioneer of hadith compilation. He was among the first to write
        down hadith systematically on the order of Caliph Umar ibn Abd
        al-Aziz. A key link in many chains of narration.
      ar: >
        من أوائل وأهم علماء الحديث، يُعتبر رائداً في تدوين الحديث.
        كان من أوائل من كتبوا الحديث بشكل منهجي بأمر من الخليفة
        عمر بن عبد العزيز. حلقة أساسية في كثير من أسانيد الرواية.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ibn_Shihab_al-Zuhri
      ar: https://ar.wikipedia.org/wiki/ابن_شهاب_الزهري
    relations:
      - type: teacher_of
        target: malik_ibn_anas
      - type: teacher_of
        target: sufyan_al_thawri

  - id: shubah_ibn_al_hajjaj
    name:
      en: Shu'bah ibn al-Hajjaj
      ar: شعبة بن الحجاج
    born: 702
    died: 776
    categories:
      - hadith
    description:
      en: >
        Known as "Amir al-Mu'minin fi al-Hadith" (Commander of the Faithful
        in Hadith), he was one of the greatest hadith critics of the early
        period. He pioneered the critical evaluation of hadith narrators
        and set standards for accepting or rejecting transmissions.
      ar: >
        يُلقب بـ"أمير المؤمنين في الحديث"، كان من أعظم نقاد الحديث
        في الفترة المبكرة. كان رائداً في نقد رواة الحديث ووضع
        معايير قبول الروايات أو ردها.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Shu%27ba_ibn_al-Hajjaj
      ar: https://ar.wikipedia.org/wiki/شعبة_بن_الحجاج
    relations:
      - type: teacher_of
        target: ahmad_ibn_hanbal

  - id: malik_ibn_anas
    name:
      en: Malik ibn Anas
      ar: مالك بن أنس
    born: 711
    died: 795
    categories:
      - hadith
      - fiqh
    description:
      en: >
        Founder of the Maliki school of jurisprudence and author of
        "al-Muwatta'," one of the earliest and most authentic collections
        of hadith. He taught in Medina and is one of the most revered
        hadith scholars in Islamic history.
      ar: >
        مؤسس المذهب المالكي ومؤلف "الموطأ"، أحد أقدم وأوثق
        مجموعات الحديث. درّس في المدينة المنورة ويُعد من
        أجلّ علماء الحديث في تاريخ الإسلام.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Medina_Masjid_Nabwi_2009.jpg/330px-Medina_Masjid_Nabwi_2009.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Malik_ibn_Anas
      ar: https://ar.wikipedia.org/wiki/مالك_بن_أنس
    relations:
      - type: student_of
        target: ibn_shihab_al_zuhri
      - type: teacher_of
        target: ahmad_ibn_hanbal

  - id: sufyan_al_thawri
    name:
      en: Sufyan al-Thawri
      ar: سفيان الثوري
    born: 716
    died: 778
    categories:
      - hadith
      - fiqh
    description:
      en: >
        One of the greatest hadith masters and jurists of the early
        Islamic period. Known for his piety and encyclopedic knowledge
        of hadith. He compiled "al-Jami'" and was considered one of
        the most reliable narrators of his generation.
      ar: >
        من أعظم أئمة الحديث والفقه في صدر الإسلام. عُرف بتقواه
        ومعرفته الموسوعية بالحديث. صنّف "الجامع" وكان يُعتبر
        من أوثق رواة جيله.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Sufyan_al-Thawri
      ar: https://ar.wikipedia.org/wiki/سفيان_الثوري
    relations:
      - type: student_of
        target: ibn_shihab_al_zuhri
      - type: colleague
        target: malik_ibn_anas

  - id: abdullah_ibn_al_mubarak
    name:
      en: Abdullah ibn al-Mubarak
      ar: عبد الله بن المبارك
    born: 736
    died: 797
    categories:
      - hadith
    description:
      en: >
        A distinguished hadith scholar, ascetic, and warrior from Merv.
        Known for his "Kitab al-Zuhd" on asceticism and his vast knowledge
        of hadith. He traveled extensively to collect hadith and was
        renowned for his piety and generosity.
      ar: >
        عالم حديث بارز وزاهد ومجاهد من مرو. معروف بكتابه
        "كتاب الزهد" ومعرفته الواسعة بالحديث. رحل كثيراً
        لجمع الحديث واشتهر بتقواه وكرمه.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Abdullah_ibn_al-Mubarak
      ar: https://ar.wikipedia.org/wiki/عبد_الله_بن_المبارك
    relations:
      - type: student_of
        target: sufyan_al_thawri
      - type: student_of
        target: malik_ibn_anas

  - id: yahya_ibn_main
    name:
      en: Yahya ibn Ma'in
      ar: يحيى بن معين
    born: 775
    died: 847
    categories:
      - hadith
    description:
      en: >
        One of the foremost authorities on hadith criticism (al-Jarh
        wa al-Ta'dil). He dedicated his life to evaluating hadith narrators,
        classifying them as reliable or weak. His judgments remain
        foundational references in hadith authentication.
      ar: >
        أحد أبرز أئمة الجرح والتعديل. كرّس حياته لتقييم رواة الحديث
        وتصنيفهم بين الثقة والضعيف. لا تزال أحكامه مراجع
        أساسية في تصحيح الحديث.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Yahya_ibn_Ma%27in
      ar: https://ar.wikipedia.org/wiki/يحيى_بن_معين
    relations:
      - type: colleague
        target: ahmad_ibn_hanbal
      - type: colleague
        target: ali_ibn_al_madini
      - type: teacher_of
        target: al_bukhari

  - id: ali_ibn_al_madini
    name:
      en: Ali ibn al-Madini
      ar: علي بن المديني
    born: 778
    died: 849
    categories:
      - hadith
    description:
      en: >
        One of the greatest hadith scholars and the foremost expert on
        'ilal (hidden defects in hadith). Al-Bukhari called him "the most
        knowledgeable person I have seen." His work on hadith defects
        set the standard for critical hadith analysis.
      ar: >
        من أعظم علماء الحديث وأبرز خبراء العلل. قال عنه البخاري
        "ما رأيت أحداً أعلم منه." وضعت أعماله في علل الحديث
        المعيار للتحليل النقدي للحديث.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ali_ibn_al-Madini
      ar: https://ar.wikipedia.org/wiki/علي_بن_المديني
    relations:
      - type: colleague
        target: ahmad_ibn_hanbal
      - type: teacher_of
        target: al_bukhari

  - id: ahmad_ibn_hanbal
    name:
      en: Ahmad ibn Hanbal
      ar: أحمد بن حنبل
    born: 780
    died: 855
    categories:
      - hadith
      - fiqh
    description:
      en: >
        Founder of the Hanbali school and compiler of the "Musnad," one
        of the largest hadith collections containing over 27,000 narrations.
        Famous for his steadfastness during the Mihna (Inquisition) regarding
        the createdness of the Quran. A towering figure in hadith and fiqh.
      ar: >
        مؤسس المذهب الحنبلي ومصنّف "المسند"، أحد أكبر مجموعات الحديث
        ويحتوي على أكثر من 27,000 رواية. اشتهر بثباته في فتنة
        خلق القرآن. شخصية محورية في الحديث والفقه.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Imam_Ahmad_ibn_Hanbal_Mosque%2C_Baghdad.jpg/330px-Imam_Ahmad_ibn_Hanbal_Mosque%2C_Baghdad.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ahmad_ibn_Hanbal
      ar: https://ar.wikipedia.org/wiki/أحمد_بن_حنبل
    relations:
      - type: student_of
        target: malik_ibn_anas
      - type: student_of
        target: shubah_ibn_al_hajjaj
      - type: teacher_of
        target: al_bukhari
      - type: teacher_of
        target: muslim_ibn_al_hajjaj
      - type: teacher_of
        target: abu_dawud

  - id: al_bukhari
    name:
      en: Imam al-Bukhari
      ar: الإمام البخاري
    born: 810
    died: 870
    categories:
      - hadith
    description:
      en: >
        Compiler of "Sahih al-Bukhari," universally regarded as the most
        authentic book of hadith. He spent 16 years compiling it, selecting
        approximately 7,275 hadith from over 600,000 narrations. His
        rigorous methodology set the gold standard for hadith authentication.
      ar: >
        مصنّف "صحيح البخاري"، المُعتبر بالإجماع أصح كتب الحديث.
        أمضى 16 عاماً في تصنيفه، منتقياً نحو 7,275 حديثاً
        من أكثر من 600,000 رواية. وضع منهجه الصارم المعيار
        الذهبي لتصحيح الحديث.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Imam_al-Bukhari%27s_shrine_in_Samarkand%2C_Uzbekistan.jpg/330px-Imam_al-Bukhari%27s_shrine_in_Samarkand%2C_Uzbekistan.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Muhammad_al-Bukhari
      ar: https://ar.wikipedia.org/wiki/محمد_بن_إسماعيل_البخاري
    relations:
      - type: student_of
        target: ahmad_ibn_hanbal
      - type: student_of
        target: ali_ibn_al_madini
      - type: student_of
        target: yahya_ibn_main
      - type: teacher_of
        target: muslim_ibn_al_hajjaj
      - type: teacher_of
        target: al_tirmidhi

  - id: muslim_ibn_al_hajjaj
    name:
      en: Imam Muslim
      ar: الإمام مسلم
    born: 821
    died: 875
    categories:
      - hadith
    description:
      en: >
        Author of "Sahih Muslim," the second most authentic hadith collection
        after Sahih al-Bukhari. Known for his meticulous arrangement and
        methodology, he compiled approximately 7,500 hadith. Together with
        al-Bukhari, they form the "Two Sahihs" (al-Sahihayn).
      ar: >
        مؤلف "صحيح مسلم"، ثاني أصح كتب الحديث بعد صحيح البخاري.
        عُرف بترتيبه الدقيق ومنهجيته، وجمع نحو 7,500 حديث.
        يشكّل مع البخاري "الصحيحين".
    wikipedia:
      en: https://en.wikipedia.org/wiki/Muslim_ibn_al-Hajjaj
      ar: https://ar.wikipedia.org/wiki/مسلم_بن_الحجاج
    relations:
      - type: student_of
        target: ahmad_ibn_hanbal
      - type: student_of
        target: al_bukhari

  - id: abu_dawud
    name:
      en: Abu Dawud al-Sijistani
      ar: أبو داود السجستاني
    born: 817
    died: 889
    categories:
      - hadith
    description:
      en: >
        Compiler of "Sunan Abi Dawud," one of the six canonical hadith
        collections (Kutub al-Sittah). His collection focuses on hadith
        relevant to Islamic jurisprudence and legal rulings. He selected
        4,800 hadith from 500,000 narrations.
      ar: >
        مصنّف "سنن أبي داود"، أحد الكتب الستة في الحديث.
        تركّز مجموعته على الأحاديث المتعلقة بالفقه والأحكام الشرعية.
        انتقى 4,800 حديث من 500,000 رواية.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Abu_Dawud_al-Sijistani
      ar: https://ar.wikipedia.org/wiki/أبو_داود_السجستاني
    relations:
      - type: student_of
        target: ahmad_ibn_hanbal

  - id: al_tirmidhi
    name:
      en: Al-Tirmidhi
      ar: الترمذي
    born: 824
    died: 892
    categories:
      - hadith
    description:
      en: >
        Author of "Jami' al-Tirmidhi" (also called "Sunan al-Tirmidhi"),
        one of the six canonical hadith collections. Uniquely, he graded
        each hadith and noted the opinions of various jurists, making his
        work invaluable for comparative fiqh.
      ar: >
        مؤلف "جامع الترمذي" (المعروف أيضاً بـ"سنن الترمذي")،
        أحد الكتب الستة. تميّز بتصنيف كل حديث وذكر آراء الفقهاء
        المختلفين، مما جعل عمله لا يُقدّر بثمن للفقه المقارن.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Tirmidhi
      ar: https://ar.wikipedia.org/wiki/الترمذي
    relations:
      - type: student_of
        target: al_bukhari

  - id: ibn_majah
    name:
      en: Ibn Majah
      ar: ابن ماجه
    born: 824
    died: 887
    categories:
      - hadith
    description:
      en: >
        Compiler of "Sunan Ibn Majah," the sixth of the canonical hadith
        collections. His collection contains hadith not found in the other
        five canonical works, making it an essential supplement for hadith
        scholarship.
      ar: >
        مصنّف "سنن ابن ماجه"، سادس الكتب الستة في الحديث.
        تحتوي مجموعته على أحاديث لا توجد في الكتب الخمسة
        الأخرى، مما يجعلها مكملاً ضرورياً لعلم الحديث.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ibn_Majah
      ar: https://ar.wikipedia.org/wiki/ابن_ماجه

  - id: al_nasai
    name:
      en: Al-Nasa'i
      ar: النسائي
    born: 829
    died: 915
    categories:
      - hadith
    description:
      en: >
        Author of "Sunan al-Nasa'i," one of the six canonical hadith
        collections, considered the most strict in narrator criteria after
        the Two Sahihs. He was renowned for his expertise in evaluating
        narrators and detecting hidden defects in hadith chains.
      ar: >
        مؤلف "سنن النسائي"، أحد الكتب الستة في الحديث، يُعتبر
        الأشد صرامة في شروط الرواة بعد الصحيحين. اشتهر بخبرته
        في تقييم الرواة وكشف العلل الخفية في الأسانيد.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Nasa%27i
      ar: https://ar.wikipedia.org/wiki/النسائي

  - id: al_tabari
    name:
      en: Al-Tabari
      ar: الطبري
    born: 839
    died: 923
    categories:
      - hadith
      - fiqh
    description:
      en: >
        Persian Muslim scholar, historian, and Quranic exegete. He is best
        known for his monumental universal history "History of the Prophets
        and Kings" and his comprehensive Quran commentary "Tafsir al-Tabari,"
        both foundational works in Islamic scholarship.
      ar: >
        عالم مسلم فارسي ومؤرخ ومفسر للقرآن. اشتهر بموسوعته التاريخية
        "تاريخ الرسل والملوك" وتفسيره الشامل "تفسير الطبري"،
        وكلاهما من الأعمال التأسيسية في العلوم الإسلامية.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Tabari
      ar: https://ar.wikipedia.org/wiki/الطبري

  - id: al_daraqutni
    name:
      en: Al-Daraqutni
      ar: الدارقطني
    born: 918
    died: 995
    categories:
      - hadith
    description:
      en: >
        One of the greatest hadith critics, author of "Sunan al-Daraqutni"
        and the monumental "Kitab al-'Ilal" on hadith defects. His expertise
        in identifying subtle flaws in narration chains was unmatched
        in his era.
      ar: >
        من أعظم نقاد الحديث، مؤلف "سنن الدارقطني" و"كتاب العلل"
        في علل الحديث. كانت خبرته في كشف العلل الدقيقة في
        أسانيد الرواية لا نظير لها في عصره.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Daraqutni
      ar: https://ar.wikipedia.org/wiki/الدارقطني

  - id: al_nawawi
    name:
      en: Imam al-Nawawi
      ar: الإمام النووي
    born: 1233
    died: 1277
    categories:
      - hadith
      - fiqh
    description:
      en: >
        One of the most influential hadith scholars and jurists. Author
        of "Riyadh al-Salihin," "al-Adhkar," and the famous "Forty Hadith."
        His commentary on Sahih Muslim remains the standard reference.
        Despite dying at age 44, his scholarly output was extraordinary.
      ar: >
        من أكثر علماء الحديث والفقه تأثيراً. مؤلف "رياض الصالحين"
        و"الأذكار" و"الأربعين النووية" الشهيرة. لا يزال شرحه
        لصحيح مسلم المرجع الأساسي. رغم وفاته في الرابعة والأربعين
        كان إنتاجه العلمي استثنائياً.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Al-Nawawi%27s_shrine_in_Nawa%2C_Syria.jpg/330px-Al-Nawawi%27s_shrine_in_Nawa%2C_Syria.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Nawawi
      ar: https://ar.wikipedia.org/wiki/النووي

  - id: al_dhahabi
    name:
      en: Al-Dhahabi
      ar: الذهبي
    born: 1274
    died: 1348
    categories:
      - hadith
    description:
      en: >
        Prolific hadith scholar and historian, author of "Siyar A'lam
        al-Nubala'" (biographies of noble figures), "Mizan al-I'tidal"
        (on narrator criticism), and "Tadhkirat al-Huffaz." His biographical
        works are indispensable references for hadith scholarship.
      ar: >
        عالم حديث ومؤرخ غزير الإنتاج، مؤلف "سير أعلام النبلاء"
        و"ميزان الاعتدال" في نقد الرواة و"تذكرة الحفاظ."
        تُعد أعماله البيوغرافية مراجع لا غنى عنها في علم الحديث.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Dhahabi
      ar: https://ar.wikipedia.org/wiki/الذهبي

  - id: ibn_hajar_al_asqalani
    name:
      en: Ibn Hajar al-Asqalani
      ar: ابن حجر العسقلاني
    born: 1372
    died: 1449
    categories:
      - hadith
    description:
      en: >
        The foremost commentator on Sahih al-Bukhari, his "Fath al-Bari"
        is considered the greatest hadith commentary ever written. He also
        authored "Nuzhat al-Nazar" on hadith methodology and "Tahdhib
        al-Tahdhib" on narrator evaluation. Known as "Amir al-Mu'minin
        fi al-Hadith" of his era.
      ar: >
        أعظم شارح لصحيح البخاري، يُعتبر كتابه "فتح الباري" أجلّ
        شرح للحديث على الإطلاق. ألّف أيضاً "نزهة النظر" في
        مصطلح الحديث و"تهذيب التهذيب" في تقييم الرواة.
        يُلقب بـ"أمير المؤمنين في الحديث" في عصره.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ibn_Hajar_al-Asqalani
      ar: https://ar.wikipedia.org/wiki/ابن_حجر_العسقلاني

  - id: al_farabi
    name:
      en: Al-Farabi
      ar: الفارابي
    born: 870
    died: 950
    categories:
      - philosophy
      - mathematics
    description:
      en: >
        Known as the "Second Teacher" (after Aristotle), Al-Farabi was a
        renowned philosopher and music theorist. He wrote on logic, political
        philosophy, metaphysics, ethics, and the classification of sciences,
        deeply influencing Avicenna and the broader Islamic intellectual tradition.
      ar: >
        يُعرف بـ"المعلم الثاني" (بعد أرسطو)، كان الفارابي فيلسوفاً ومنظّراً
        موسيقياً. كتب في المنطق والفلسفة السياسية والميتافيزيقا والأخلاق
        وتصنيف العلوم، وأثّر بعمق في ابن سينا والتقليد الفكري الإسلامي.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Alpharabius_in_Liber_Chronicarum_1493_AD.png/330px-Alpharabius_in_Liber_Chronicarum_1493_AD.png
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Farabi
      ar: https://ar.wikipedia.org/wiki/الفارابي
    relations:
      - type: teacher_of
        target: ibn_sina
      - type: influenced
        target: ibn_rushd

  - id: ibn_al_haytham
    name:
      en: Ibn al-Haytham (Alhazen)
      ar: ابن الهيثم
    born: 965
    died: 1040
    categories:
      - optics
      - mathematics
      - astronomy
    description:
      en: >
        Arab physicist, mathematician, and astronomer, widely regarded as
        the father of modern optics. His seven-volume "Book of Optics"
        fundamentally changed the understanding of light and vision and
        introduced the scientific method of experimentation.
      ar: >
        عالم فيزياء ورياضيات وفلك عربي، يُعتبر على نطاق واسع أبا
        البصريات الحديثة. غيّر كتابه "المناظر" المؤلف من سبعة مجلدات
        فهم الضوء والرؤية وأدخل المنهج العلمي التجريبي.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Ibn_al-Haytham_crop.jpg/330px-Ibn_al-Haytham_crop.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ibn_al-Haytham
      ar: https://ar.wikipedia.org/wiki/ابن_الهيثم
    relations:
      - type: teacher_of
        target: mohamed_ibn_ahmed

  - id: al_biruni
    name:
      en: Abu Rayhan al-Biruni
      ar: أبو الريحان البيروني
    born: 973
    died: 1048
    categories:
      - mathematics
      - astronomy
    description:
      en: >
        A polymath who excelled in mathematics, astronomy, natural sciences,
        and history. He accurately calculated the Earth's circumference
        using trigonometry and wrote extensively on Indian culture,
        producing one of the finest comparative studies of the medieval era.
      ar: >
        عالم موسوعي برع في الرياضيات والفلك والعلوم الطبيعية والتاريخ.
        حسب محيط الأرض بدقة باستخدام علم المثلثات وكتب بإسهاب عن
        الثقافة الهندية، منتجاً واحدة من أفضل الدراسات المقارنة في العصور الوسطى.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Biruni-russian.jpg/330px-Biruni-russian.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Biruni
      ar: https://ar.wikipedia.org/wiki/البيروني
    relations:
      - type: colleague
        target: ibn_sina

  - id: ibn_sina
    name:
      en: Ibn Sina (Avicenna)
      ar: ابن سينا
    born: 980
    died: 1037
    categories:
      - medicine
      - philosophy
    description:
      en: >
        Persian polymath regarded as the father of early modern medicine.
        His "Canon of Medicine" was a standard medical text in Europe and
        the Islamic world for centuries. He also wrote extensively on
        philosophy, astronomy, and logic.
      ar: >
        عالم موسوعي فارسي يُعتبر أبا الطب الحديث المبكر.
        كان كتابه "القانون في الطب" مرجعاً طبياً في أوروبا والعالم
        الإسلامي لقرون. كتب أيضاً بإسهاب في الفلسفة والفلك والمنطق.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Avicenna_Bust%2C_left_profile_%28cropped%29.jpg/330px-Avicenna_Bust%2C_left_profile_%28cropped%29.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Avicenna
      ar: https://ar.wikipedia.org/wiki/ابن_سينا
    relations:
      - type: student_of
        target: al_farabi
      - type: colleague
        target: al_biruni
      - type: influenced
        target: al_ghazali

  - id: ahmed_ibn_ali
    name:
      en: Ahmed ibn Ali
      ar: أحمد بن علي
    born: 1000
    died: 1100
    categories:
      - mathematics
      - kalam
    description:
      en: >
        A renowned scholar of mathematics and theology in Baghdad.
        Known for his contributions to algebra and Quranic studies.
      ar: >
        عالم مشهور في الرياضيات واللاهوت في بغداد.
        معروف بإسهاماته في الجبر والدراسات القرآنية.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ahmed_ibn_Ali
    relations:
      - type: father_of
        target: mohamed_ibn_ahmed

  - id: nizam_al_mulk
    name:
      en: Nizam al-Mulk
      ar: نظام الملك
    born: 1018
    died: 1092
    categories:
      - authority
    description:
      en: >
        Persian scholar and vizier of the Seljuk Empire. Founded the
        Nizamiyyah network of madrasas, some of the first universities
        in the world, and authored the "Siyasatnama" on statecraft.
      ar: >
        عالم ووزير فارسي في الدولة السلجوقية. أسس شبكة
        المدارس النظامية، من أوائل الجامعات في التاريخ،
        وألّف كتاب "سياست‌نامه" في فن الحكم.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Nizam_Al-Mulk.png/330px-Nizam_Al-Mulk.png
    wikipedia:
      en: https://en.wikipedia.org/wiki/Nizam_al-Mulk
      ar: https://ar.wikipedia.org/wiki/نظام_الملك
    relations:
      - type: influenced
        target: al_ghazali

  - id: omar_khayyam
    name:
      en: Omar Khayyam
      ar: عمر الخيام
    born: 1048
    died: 1131
    categories:
      - mathematics
      - astronomy
      - philosophy
    description:
      en: >
        Persian mathematician, astronomer, and poet. Known for his work
        on cubic equations, the Jalali calendar reform, and his famous
        Rubaiyat poetry collection.
      ar: >
        عالم رياضيات وفلكي وشاعر فارسي. معروف بأعماله في
        المعادلات التكعيبية وإصلاح التقويم الجلالي ومجموعة الرباعيات الشهيرة.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Hakim_Omar_Khayam_-_panoramio.jpg/330px-Hakim_Omar_Khayam_-_panoramio.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Omar_Khayyam
      ar: https://ar.wikipedia.org/wiki/عمر_الخيام

  - id: mohamed_ibn_ahmed
    name:
      en: Mohamed ibn Ahmed
      ar: محمد بن أحمد
    born: 1050
    died: 1120
    categories:
      - optics
      - astronomy
    description:
      en: >
        Son of Ahmed ibn Ali. Continued his father's work in mathematics
        and made advances in optics and astronomy.
      ar: >
        ابن أحمد بن علي. تابع عمل والده في الرياضيات
        وحقق تقدماً في البصريات وعلم الفلك.
    relations:
      - type: child_of
        target: ahmed_ibn_ali
      - type: student_of
        target: ibn_al_haytham

  - id: al_ghazali
    name:
      en: Abu Hamid al-Ghazali
      ar: أبو حامد الغزالي
    born: 1058
    died: 1111
    categories:
      - kalam
      - fiqh
      - philosophy
    description:
      en: >
        One of the most influential Muslim theologians, philosophers, and
        jurists. His "Incoherence of the Philosophers" challenged Aristotelian
        philosophy, while his "Revival of the Religious Sciences" remains
        a masterpiece of Islamic spirituality and ethics.
      ar: >
        أحد أكثر علماء المسلمين تأثيراً في اللاهوت والفلسفة والفقه.
        تحدّى كتابه "تهافت الفلاسفة" الفلسفة الأرسطية، بينما يبقى
        كتابه "إحياء علوم الدين" تحفة في الروحانية والأخلاق الإسلامية.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Al-Ghazali
      ar: https://ar.wikipedia.org/wiki/أبو_حامد_الغزالي
    relations:
      - type: influenced
        target: ibn_rushd

  - id: ibn_rushd
    name:
      en: Ibn Rushd (Averroes)
      ar: ابن رشد
    born: 1126
    died: 1198
    categories:
      - philosophy
      - fiqh
      - medicine
    description:
      en: >
        Andalusian Muslim polymath and jurist. His extensive commentaries
        on Aristotle earned him the title "The Commentator" and profoundly
        influenced both Islamic and European medieval thought. He wrote
        "The Incoherence of the Incoherence" in response to al-Ghazali.
      ar: >
        عالم موسوعي وفقيه أندلسي. أكسبته شروحاته المستفيضة على أرسطو
        لقب "الشارح" وأثّرت تأثيراً عميقاً في الفكر الإسلامي والأوروبي
        في العصور الوسطى. ألّف "تهافت التهافت" رداً على الغزالي.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Andrea_di_bonaiuto%2C_apotesosi_di_san_tommaso_d%27aquino%2C_11_averro%C3%A8.jpg/330px-Andrea_di_bonaiuto%2C_apotesosi_di_san_tommaso_d%27aquino%2C_11_averro%C3%A8.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Averroes
      ar: https://ar.wikipedia.org/wiki/ابن_رشد
    relations:
      - type: influenced
        target: al_ghazali

  - id: saladin
    name:
      en: Salah ad-Din (Saladin)
      ar: صلاح الدين الأيوبي
    born: 1137
    died: 1193
    categories:
      - authority
    description:
      en: >
        The first sultan of Egypt and Syria, founder of the Ayyubid dynasty.
        Known for recapturing Jerusalem during the Crusades and his
        chivalrous conduct toward his adversaries.
      ar: >
        أول سلطان لمصر والشام، مؤسس الدولة الأيوبية.
        معروف باستعادة القدس خلال الحروب الصليبية وبسلوكه
        الفروسي تجاه خصومه.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Saladin_and_Guy.jpg/330px-Saladin_and_Guy.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Saladin
      ar: https://ar.wikipedia.org/wiki/صلاح_الدين_الأيوبي

  - id: ibn_khaldun
    name:
      en: Ibn Khaldun
      ar: ابن خلدون
    born: 1332
    died: 1406
    categories:
      - philosophy
      - authority
    description:
      en: >
        Arab Islamic scholar, historian, and philosopher, widely considered
        the founder of sociology and historiography. His masterwork
        "Muqaddimah" introduced a scientific approach to the study of
        history, analyzing the rise and fall of civilizations through
        social cohesion (asabiyyah) and economic factors.
      ar: >
        عالم ومؤرخ وفيلسوف عربي إسلامي، يُعتبر على نطاق واسع مؤسس
        علم الاجتماع والتأريخ. قدّم في كتابه "المقدمة" منهجاً علمياً
        لدراسة التاريخ، محللاً صعود الحضارات وسقوطها من خلال
        العصبية والعوامل الاقتصادية.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Bust_of_Ibn_Khaldun_%28Casbah_of_Bejaia%2C_Algeria%29.jpg/330px-Bust_of_Ibn_Khaldun_%28Casbah_of_Bejaia%2C_Algeria%29.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ibn_Khaldun
      ar: https://ar.wikipedia.org/wiki/ابن_خلدون

  # ---- Ancient Era (BC) ----

  - id: socrates
    name:
      en: Socrates
      ar: سقراط
    born: -469
    died: -398
    categories:
      - philosophy
    description:
      en: >
        Classical Greek philosopher credited as the founder of Western
        philosophy. Known for his Socratic method of questioning, he
        left no writings—his ideas survive through the works of his
        students, especially Plato.
      ar: >
        فيلسوف يوناني كلاسيكي يُنسب إليه تأسيس الفلسفة الغربية.
        عُرف بمنهجه السقراطي في الاستجواب، ولم يترك كتابات—
        بقيت أفكاره من خلال أعمال تلاميذه، خاصة أفلاطون.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Socrate_du_Louvre.jpg/330px-Socrate_du_Louvre.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Socrates
      ar: https://ar.wikipedia.org/wiki/سقراط
    relations:
      - type: teacher_of
        target: plato

  - id: hippocrates
    name:
      en: Hippocrates
      ar: أبقراط
    born: -460
    died: -370
    categories:
      - medicine
    description:
      en: >
        Ancient Greek physician regarded as the "Father of Medicine."
        He established medicine as a discipline distinct from philosophy
        and religion. The Hippocratic Oath remains a foundational
        ethical guide for physicians.
      ar: >
        طبيب يوناني قديم يُعتبر "أبا الطب." أسّس الطب كعلم
        مستقل عن الفلسفة والدين. لا يزال قَسَم أبقراط
        دليلاً أخلاقياً أساسياً للأطباء.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Hippocrates.jpg/330px-Hippocrates.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Hippocrates
      ar: https://ar.wikipedia.org/wiki/أبقراط

  - id: plato
    name:
      en: Plato
      ar: أفلاطون
    born: -427
    died: -347
    categories:
      - philosophy
    description:
      en: >
        Athenian philosopher and founder of the Academy, the first
        institution of higher learning in the Western world. His dialogues
        explored justice, beauty, and the theory of Forms, profoundly
        shaping Western thought.
      ar: >
        فيلسوف أثيني ومؤسس الأكاديمية، أول مؤسسة للتعليم العالي
        في العالم الغربي. استكشفت حواراته العدالة والجمال
        ونظرية المُثُل، مشكّلاً الفكر الغربي بعمق.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Plato_Silanion_Musei_Capitolini_MC1377.png/330px-Plato_Silanion_Musei_Capitolini_MC1377.png
    wikipedia:
      en: https://en.wikipedia.org/wiki/Plato
      ar: https://ar.wikipedia.org/wiki/أفلاطون
    relations:
      - type: teacher_of
        target: aristotle
      - type: student_of
        target: socrates

  - id: aristotle
    name:
      en: Aristotle
      ar: أرسطو
    born: -383
    died: -321
    categories:
      - philosophy
      - science
    description:
      en: >
        Greek philosopher and polymath, student of Plato and tutor of
        Alexander the Great. His writings on logic, physics, biology,
        ethics, politics, and metaphysics formed the foundation of
        Western philosophy and science for millennia.
      ar: >
        فيلسوف وعالم موسوعي يوناني، تلميذ أفلاطون ومعلم
        الإسكندر الأكبر. شكّلت كتاباته في المنطق والفيزياء
        والأحياء والأخلاق والسياسة والميتافيزيقا أساس الفلسفة
        والعلوم الغربية لآلاف السنين.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Aristotle_Altemps_Inv8575.jpg/330px-Aristotle_Altemps_Inv8575.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Aristotle
      ar: https://ar.wikipedia.org/wiki/أرسطو
    relations:
      - type: student_of
        target: plato
      - type: teacher_of
        target: alexander_the_great

  - id: alexander_the_great
    name:
      en: Alexander the Great
      ar: الإسكندر الأكبر
    born: -355
    died: -322
    categories:
      - authority
    description:
      en: >
        King of Macedon who created one of the largest empires in ancient
        history, stretching from Greece to northwestern India. A student
        of Aristotle, he spread Greek culture across his vast conquests.
      ar: >
        ملك مقدونيا الذي أنشأ واحدة من أكبر الإمبراطوريات في التاريخ
        القديم، ممتدة من اليونان إلى شمال غرب الهند. تلميذ أرسطو،
        نشر الثقافة اليونانية عبر فتوحاته الواسعة.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Alexander_Mosaic_detail_of_Alexander_the_Great_%283x4_cropped%29.jpg/330px-Alexander_Mosaic_detail_of_Alexander_the_Great_%283x4_cropped%29.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Alexander_the_Great
      ar: https://ar.wikipedia.org/wiki/الإسكندر_الأكبر
    relations:
      - type: student_of
        target: aristotle

  - id: euclid
    name:
      en: Euclid
      ar: إقليدس
    born: -325
    died: -265
    categories:
      - mathematics
    description:
      en: >
        Greek mathematician often referred to as the "Father of Geometry."
        His treatise "Elements" is one of the most influential works in
        the history of mathematics and served as the main textbook for
        geometry for over 2,000 years.
      ar: >
        عالم رياضيات يوناني يُشار إليه بـ"أبي الهندسة."
        يُعد كتابه "العناصر" من أكثر الأعمال تأثيراً في تاريخ
        الرياضيات وكان المرجع الأساسي للهندسة لأكثر من ألفي عام.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/c/c6/Jusepe_de_Ribera_-_Euclid_-_2001.26_-_J._Paul_Getty_Museum.jpg/330px-Jusepe_de_Ribera_-_Euclid_-_2001.26_-_J._Paul_Getty_Museum.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Euclid
      ar: https://ar.wikipedia.org/wiki/إقليدس

  - id: archimedes
    name:
      en: Archimedes
      ar: أرخميدس
    born: -287
    died: -211
    categories:
      - mathematics
      - science
    description:
      en: >
        Greek mathematician, physicist, and engineer, considered the
        greatest mathematician of antiquity. He discovered the principles
        of buoyancy and the lever, calculated pi with remarkable precision,
        and invented ingenious war machines.
      ar: >
        عالم رياضيات وفيزيائي ومهندس يوناني، يُعتبر أعظم
        عالم رياضيات في العصور القديمة. اكتشف مبادئ الطفو
        والرافعة، وحسب العدد باي بدقة ملحوظة.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Domenico-Fetti_Archimedes_1620.jpg/330px-Domenico-Fetti_Archimedes_1620.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Archimedes
      ar: https://ar.wikipedia.org/wiki/أرخميدس

  # ---- Classical Era (CE) ----

  - id: ptolemy
    name:
      en: Ptolemy
      ar: بطليموس
    born: 100
    died: 170
    categories:
      - astronomy
      - mathematics
    description:
      en: >
        Greco-Egyptian mathematician, astronomer, and geographer. His
        astronomical treatise "Almagest" presented the geocentric model
        and remained the authority on astronomy for over a thousand years.
      ar: >
        عالم رياضيات وفلك وجغرافيا يوناني-مصري. قدّم كتابه
        "المجسطي" النموذج الجيومركزي وظل المرجع في علم الفلك
        لأكثر من ألف عام.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Ptolemy_1476_with_armillary_sphere_model.jpg/330px-Ptolemy_1476_with_armillary_sphere_model.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ptolemy
      ar: https://ar.wikipedia.org/wiki/بطليموس

  - id: galen
    name:
      en: Galen
      ar: جالينوس
    born: 129
    died: 216
    categories:
      - medicine
    description:
      en: >
        Greco-Roman physician and philosopher. The most accomplished
        medical researcher of antiquity, his theories dominated Western
        and Islamic medicine for more than 1,300 years.
      ar: >
        طبيب وفيلسوف يوناني-روماني. أبرز الباحثين الطبيين
        في العصور القديمة، هيمنت نظرياته على الطب الغربي
        والإسلامي لأكثر من 1300 عام.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Galenus.jpg/330px-Galenus.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Galen
      ar: https://ar.wikipedia.org/wiki/جالينوس

  # ---- Late Medieval / Early Modern ----

  - id: ibn_al_nafis
    name:
      en: Ibn al-Nafis
      ar: ابن النفيس
    born: 1213
    died: 1288
    categories:
      - medicine
      - fiqh
    description:
      en: >
        Arab physician who first described pulmonary circulation,
        predating William Harvey by nearly 400 years. He also wrote
        on ophthalmology and Islamic jurisprudence.
      ar: >
        طبيب عربي وصف الدورة الدموية الرئوية لأول مرة،
        سابقاً ويليام هارفي بنحو 400 عام. كتب أيضاً
        في طب العيون والفقه الإسلامي.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Ibn_Al_Nafis_statue.jpg/330px-Ibn_Al_Nafis_statue.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ibn_al-Nafis
      ar: https://ar.wikipedia.org/wiki/ابن_النفيس

  - id: copernicus
    name:
      en: Nicolaus Copernicus
      ar: نيكولاس كوبرنيكوس
    born: 1473
    died: 1543
    categories:
      - astronomy
      - mathematics
    description:
      en: >
        Renaissance polymath who formulated the heliocentric model of
        the universe. His work "De revolutionibus" launched the
        Scientific Revolution.
      ar: >
        عالم موسوعي من عصر النهضة صاغ النموذج الشمسي المركزي
        للكون. أطلق كتابه "في دوران الأجرام السماوية" الثورة العلمية.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Nikolaus_Kopernikus_MOT.jpg/330px-Nikolaus_Kopernikus_MOT.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Nicolaus_Copernicus
      ar: https://ar.wikipedia.org/wiki/نيكولاس_كوبرنيكوس

  - id: galileo
    name:
      en: Galileo Galilei
      ar: غاليليو غاليلي
    born: 1564
    died: 1642
    categories:
      - astronomy
      - science
    description:
      en: >
        Italian astronomer and physicist called the "Father of Modern
        Science." His telescopic observations confirmed the heliocentric
        model and his studies of motion laid the groundwork for
        Newton's laws.
      ar: >
        فلكي وفيزيائي إيطالي يُلقب بـ"أبي العلم الحديث."
        أكدت ملاحظاته التلسكوبية النموذج الشمسي المركزي
        ووضعت دراساته للحركة أساس قوانين نيوتن.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Galileo_Galilei_%281564-1642%29_RMG_BHC2700.tiff/lossy-page1-330px-Galileo_Galilei_%281564-1642%29_RMG_BHC2700.tiff.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Galileo_Galilei
      ar: https://ar.wikipedia.org/wiki/غاليليو_غاليلي
    relations:
      - type: influenced
        target: copernicus

  - id: newton
    name:
      en: Isaac Newton
      ar: إسحاق نيوتن
    born: 1643
    died: 1727
    categories:
      - mathematics
      - science
    description:
      en: >
        English mathematician and physicist widely recognized as one of
        the greatest scientists of all time. He formulated the laws of
        motion and universal gravitation, co-invented calculus, and made
        foundational contributions to optics.
      ar: >
        عالم رياضيات وفيزياء إنجليزي يُعتبر من أعظم العلماء
        في التاريخ. صاغ قوانين الحركة والجاذبية الكونية وشارك
        في اختراع حساب التفاضل والتكامل.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Portrait_of_Sir_Isaac_Newton%2C_1689_%28brightened%29.jpg/330px-Portrait_of_Sir_Isaac_Newton%2C_1689_%28brightened%29.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Isaac_Newton
      ar: https://ar.wikipedia.org/wiki/إسحاق_نيوتن
    relations:
      - type: influenced
        target: galileo

  # ---- Modern Era ----

  - id: darwin
    name:
      en: Charles Darwin
      ar: تشارلز داروين
    born: 1809
    died: 1882
    categories:
      - science
    description:
      en: >
        English naturalist who established that all species descended
        from common ancestors through natural selection. His "On the
        Origin of Species" is one of the most transformative scientific
        works ever published.
      ar: >
        عالم طبيعيات إنجليزي أثبت أن جميع الأنواع تنحدر من أسلاف
        مشتركة عبر الانتقاء الطبيعي. يُعد كتابه "أصل الأنواع"
        من أكثر الأعمال العلمية تحولية في التاريخ.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Charles_Darwin_seated_crop.jpg/330px-Charles_Darwin_seated_crop.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Charles_Darwin
      ar: https://ar.wikipedia.org/wiki/تشارلز_داروين

  - id: einstein
    name:
      en: Albert Einstein
      ar: ألبرت أينشتاين
    born: 1879
    died: 1955
    categories:
      - science
      - mathematics
    description:
      en: >
        German-born theoretical physicist who developed the theory of
        relativity, one of the two pillars of modern physics. His
        mass-energy equivalence formula E=mc² is the world's most
        famous equation.
      ar: >
        فيزيائي نظري ألماني المولد طوّر نظرية النسبية، أحد ركيزتي
        الفيزياء الحديثة. تُعد معادلته E=mc² أشهر معادلة في العالم.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Albert_Einstein_Head_cleaned.jpg/330px-Albert_Einstein_Head_cleaned.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Albert_Einstein
      ar: https://ar.wikipedia.org/wiki/ألبرت_أينشتاين
    relations:
      - type: influenced
        target: newton

  # ---- Modern Physics & Computer Science ----

  - id: alan_turing
    name:
      en: Alan Turing
      ar: آلان تورنغ
    born: 1912
    died: 1954
    categories:
      - mathematics
      - computer_science
    description:
      en: >
        British mathematician and logician, widely considered the father
        of theoretical computer science and artificial intelligence. He
        formalized the concept of computation with the Turing machine
        and played a pivotal role in breaking the Enigma code during WWII.
      ar: >
        عالم رياضيات ومنطق بريطاني يُعتبر على نطاق واسع أب علوم
        الحاسوب النظرية والذكاء الاصطناعي. صاغ مفهوم الحوسبة بآلة
        تورنغ ولعب دوراً محورياً في فك شفرة إنيغما في الحرب العالمية الثانية.
    image: https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Alan_Turing_Aged_16.jpg/330px-Alan_Turing_Aged_16.jpg
    wikipedia:
      en: https://en.wikipedia.org/wiki/Alan_Turing
      ar: https://ar.wikipedia.org/wiki/آلان_تورنغ

  - id: john_von_neumann
    name:
      en: John von Neumann
      ar: جون فون نيومان
    born: 1903
    died: 1957
    categories:
      - mathematics
      - computer_science
      - physics
    description:
      en: >
        Hungarian-American polymath who made major contributions to
        mathematics, physics, computer science, and economics. He
        designed the von Neumann architecture that underpins virtually
        all modern computers and contributed to quantum mechanics and game theory.
      ar: >
