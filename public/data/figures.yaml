# =============================================================
# Historical Figures Database
# =============================================================
#
# CATEGORIES LIST (used for display labels):

categories:
  - id: science
    name:
      en: Science
      ar: علوم
  - id: religion
    name:
      en: Religion
      ar: دين
  - id: authority
    name:
      en: Authority
      ar: سلطة
  - id: philosophy
    name:
      en: Philosophy
      ar: فلسفة

relation_types:
  - id: father_of
    name:
      en: Father of
      ar: والد
  - id: mother_of
    name:
      en: Mother of
      ar: والدة
  - id: child_of
    name:
      en: Child of
      ar: ابن/ابنة
  - id: teacher_of
    name:
      en: Teacher of
      ar: أستاذ
  - id: student_of
    name:
      en: Student of
      ar: تلميذ
  - id: influenced
    name:
      en: Influenced
      ar: أثّر على
  - id: colleague
    name:
      en: Colleague of
      ar: زميل
# HOW TO ADD A NEW PERSON:
#
# Copy the template below and fill in the details:
#
#   - id: unique_id          # A short unique name (no spaces, use underscores)
#     name:                   # Name supports multiple languages:
#       en: Full Name         #   English name
#       ar: الاسم الكامل       #   Arabic name (optional)
#     born: 1000              # Year of birth (Gregorian)
#     died: 1100              # Year of death (Gregorian)
#     categories:             # One or more of: science, religion, authority, philosophy
#       - science
#     description:            # Description supports multiple languages:
#       en: A short bio in English
#       ar: نبذة مختصرة بالعربية  # (optional)
#     relations:              # Optional: connections to other people
#       - type: father_of     # Options: father_of, mother_of, child_of, teacher_of, student_of, influenced, colleague
#         target: other_id    # The id of the related person
#
# NOTE: For name and description, you can also use a plain string
#       if you only need one language:
#         name: Ahmed ibn Ali
#
# =============================================================

figures:

  # ---- The Islamic Golden Age ----

  - id: ahmed_ibn_ali
    name:
      en: Ahmed ibn Ali
      ar: أحمد بن علي
    born: 1000
    died: 1100
    categories:
      - science
      - religion
    description:
      en: >
        A renowned scholar of mathematics and theology in Baghdad.
        Known for his contributions to algebra and Quranic studies.
      ar: >
        عالم مشهور في الرياضيات واللاهوت في بغداد.
        معروف بإسهاماته في الجبر والدراسات القرآنية.
    wikipedia:
      en: https://en.wikipedia.org/wiki/Ahmed_ibn_Ali
    relations:
      - type: father_of
        target: mohamed_ibn_ahmed

  - id: mohamed_ibn_ahmed
    name:
      en: Mohamed ibn Ahmed
      ar: محمد بن أحمد
    born: 1050
    died: 1120
    categories:
      - science
    description:
      en: >
        Son of Ahmed ibn Ali. Continued his father's work in mathematics
        and made advances in optics and astronomy.
      ar: >
        ابن أحمد بن علي. تابع عمل والده في الرياضيات
        وحقق تقدمًا في البصريات وعلم الفلك.
    relations:
      - type: child_of
        target: ahmed_ibn_ali
      - type: student_of
        target: ibn_al_haytham

  - id: ibn_al_haytham
    name:
      en: Ibn al-Haytham (Alhazen)
      ar: ابن الهيثم
    born: 965
    died: 1040
    categories:
      - science
    description:
      en: >
        The father of modern optics. His Book of Optics fundamentally
        changed the understanding of light and vision.
      ar: >
        أبو البصريات الحديثة. كتابه "المناظر" غيّر بشكل جذري
        فهم الضوء والرؤية.
    relations:
      - type: teacher_of
        target: mohamed_ibn_ahmed

  - id: al_ghazali
    name:
      en: Abu Hamid al-Ghazali
      ar: أبو حامد الغزالي
    born: 1058
    died: 1111
    categories:
      - religion
      - philosophy
    description:
      en: >
        One of the most influential Muslim theologians and philosophers.
        His work "The Incoherence of the Philosophers" reshaped Islamic thought.
      ar: >
        أحد أكثر علماء المسلمين تأثيرًا في اللاهوت والفلسفة.
        أعاد كتابه "تهافت الفلاسفة" تشكيل الفكر الإسلامي.

  - id: saladin
    name:
      en: Salah ad-Din (Saladin)
      ar: صلاح الدين الأيوبي
    born: 1137
    died: 1193
    categories:
      - authority
    description:
      en: >
        The first sultan of Egypt and Syria, founder of the Ayyubid dynasty.
        Known for recapturing Jerusalem during the Crusades.
      ar: >
        أول سلطان لمصر والشام، مؤسس الدولة الأيوبية.
        معروف باستعادة القدس خلال الحروب الصليبية.

  - id: ibn_rushd
    name:
      en: Ibn Rushd (Averroes)
      ar: ابن رشد
    born: 1126
    died: 1198
    categories:
      - philosophy
      - science
    description:
      en: >
        Andalusian philosopher and polymath. His commentaries on Aristotle
        profoundly influenced both Islamic and European thought.
      ar: >
        فيلسوف وعالم موسوعي أندلسي. أثرت شروحاته على أرسطو
        تأثيرًا عميقًا في الفكر الإسلامي والأوروبي.
    relations:
      - type: influenced
        target: al_ghazali

  - id: ibn_sina
    name:
      en: Ibn Sina (Avicenna)
      ar: ابن سينا
    born: 980
    died: 1037
    categories:
      - science
      - philosophy
    description:
      en: >
        Persian polymath regarded as the father of early modern medicine.
        His Canon of Medicine was a standard medical text for centuries.
      ar: >
        عالم موسوعي فارسي يُعتبر أبا الطب الحديث المبكر.
        كان كتابه "القانون في الطب" مرجعًا طبيًا لقرون.

  - id: nizam_al_mulk
    name:
      en: Nizam al-Mulk
      ar: نظام الملك
    born: 1018
    died: 1092
    categories:
      - authority
    description:
      en: >
        Persian scholar and vizier of the Seljuk Empire. Founded the
        Nizamiyyah network of madrasas, some of the first universities.
      ar: >
        عالم ووزير فارسي في الدولة السلجوقية. أسس شبكة
        المدارس النظامية، من أوائل الجامعات في التاريخ.
    relations:
      - type: influenced
        target: al_ghazali

  - id: omar_khayyam
    name:
      en: Omar Khayyam
      ar: عمر الخيام
    born: 1048
    died: 1131
    categories:
      - science
      - philosophy
    description:
      en: >
        Persian mathematician, astronomer, and poet. Known for his work
        on cubic equations and the famous Rubaiyat poetry collection.
      ar: >
        عالم رياضيات وفلكي وشاعر فارسي. معروف بأعماله في
        المعادلات التكعيبية ومجموعة الرباعيات الشهيرة.

  - id: al_biruni
    name:
      en: Abu Rayhan al-Biruni
      ar: أبو الريحان البيروني
    born: 973
    died: 1048
    categories:
      - science
    description:
      en: >
        A polymath who excelled in mathematics, astronomy, and natural sciences.
        Accurately calculated the Earth's circumference.
      ar: >
        عالم موسوعي برع في الرياضيات والفلك والعلوم الطبيعية.
        حسب محيط الأرض بدقة.
    relations:
      - type: colleague
        target: ibn_sina
